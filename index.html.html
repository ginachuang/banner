<!DOCTYPE html><html lang="zh-TW"><head><meta charset="utf-8"><title>蝦皮活動框批次工具(簡易版)</title><style>body{font-family:Arial;max-width:700px;margin:30px auto}button{padding:10px 18px}</style></head><body><h2>蝦皮活動框批次工具(簡易版)</h2><ol><li>上傳活動框(PNG透明)</li><li>可批次傳500張商品圖</li><li>按開始後，將自動把商品圖套框</li><li>自動下載JPG檔，格式為1:1比例圖片（需允許多重下載）</li></ol><input id="frame" type="file" accept="image/png"><br><br><input id="imgs" type="file" accept="image/*" multiple><br><br><button onclick="run()">開始</button><div id="log"></div><script>
async function L(f){return new Promise(r=>{let i=new Image();i.onload=()=>r(i);i.src=URL.createObjectURL(f);});}
async function run(){const ff=frame.files[0],fs=[...imgs.files];if(!ff||!fs.length)return alert("請選檔");if(fs.length>500)return alert("最多500張");const fr=await L(ff);let c=document.createElement("canvas");c.width=1000;c.height=1000;let x=c.getContext("2d");for(let n=0;n<fs.length;n++){log.innerText=`處理 ${n+1}/${fs.length}`;let im=await L(fs[n]);x.clearRect(0,0,1000,1000);x.drawImage(im,0,0,1000,1000);x.drawImage(fr,0,0,1000,1000);let q=.92,u;do{u=c.toDataURL("image/jpeg",q);q-=.05;}while(u.length*.75>512000&&q>.3);let a=document.createElement("a");a.href=u;a.download=fs[n].name.replace(/\.[^.]+$/,"")+"_活動.jpg";a.click();await new Promise(r=>setTimeout(r,120));}log.innerText="完成";}
</script></body></html>
